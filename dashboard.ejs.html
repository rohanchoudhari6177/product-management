<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management Dashboard</title>
    <!-- This links to your CSS file in the public/css folder -->
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>

    <h1>Product Management Module</h1>

    <div class="form-container">
        <h3>Add a New Product</h3>
        <!-- Note the "/" before admin; this tells the browser to use the server root -->
        <form action="/admin/add-product" method="POST" style="display: flex; gap: 10px; flex-wrap: wrap;">
            <div class="input-group">
                <label>Product Name</label>
                <input type="text" name="name" required placeholder="e.g., Wireless Mouse">
            </div>
            <div class="input-group">
                <label>SKU</label>
                <input type="text" name="sku" required placeholder="e.g., WM-101">
            </div>
            <div class="input-group">
                <label>Price ($)</label>
                <input type="number" step="0.01" name="price" required placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Stock</label>
                <input type="number" name="stock" required placeholder="100">
            </div>
            <button type="submit">Add Product</button>
        </form>
    </div>

    <hr>

    <table>
        <thead>
            <tr>
                <th>Product Details</th>
                <th>SKU</th>
                <th>Inventory</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- This loop only works if you visit http://localhost:3000/admin/dashboard -->
            <% products.forEach(product => { %>
                <tr class="<%= !product.status ? 'inactive-row' : '' %>">
                    <td>
                        <strong><%= product.product_name %></strong>
                    </td>
                    <td><code><%= product.SKU %></code></td>
                    <td><%= product.inventory_count %></td>
                    <td>
                        <span class="badge <%= product.status ? 'status-active' : 'status-inactive' %>">
                            <%= product.status ? 'Active' : 'Inactive' %>
                        </span>
                    </td>
                    <td>
                        <!-- Soft Delete Functionality with Warning -->
                        <form action="/admin/deactivate/<%= product.product_id %>" method="POST" 
                              onsubmit="return confirm('Warning: Deactivating this product will hide it from the customer interface. Continue?');">
                            <button type="submit" class="btn-deactivate" <%= !product.status ? 'disabled' : '' %>>
                                Deactivate
                            </button>
                        </form>
                    </td>
                </tr>
            <% }); %>
        </tbody>
    </table>

</body>
</html>
